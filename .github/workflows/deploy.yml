name: Deploy (Vercel)

# Auto-deploys production on every push to main.
# Activates once a VERCEL_TOKEN secret is present; otherwise it skips cleanly so
# the workflow never shows a red failure. VERCEL_ORG_ID / VERCEL_PROJECT_ID are
# pre-set as repo secrets.
#
# Tip: you can instead connect this repo in the Vercel dashboard (Git
# integration) for the same effect with no token needed.

on:
  push:
    branches: [main]

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy to Vercel
    runs-on: ubuntu-latest
    steps:
      - name: Check for VERCEL_TOKEN
        id: guard
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "VERCEL_TOKEN not set — skipping deploy (add it in repo secrets to enable CD)."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.run == 'true'

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.run == 'true'
        with:
          node-version: 22

      - name: Install Vercel CLI
        if: steps.guard.outputs.run == 'true'
        run: npm install -g vercel@latest

      - name: Pull environment, build & deploy
        if: steps.guard.outputs.run == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
